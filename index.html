<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
    <title>Unpack the Brackets — Expanding & Simplifying Algebra</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&family=Atkinson+Hyperlegible:ital,wght@0,400;0,700;1,400&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --ink: #1F2330;
            --paper: #FBF6EC;
            --paper-soft: #F3ECDC;
            --navy: #2B3A55;
            --coral: #E8714A;
            --coral-dark: #C8552F;
            --mint: #7FBEA0;
            --mint-dark: #5C9C7E;
            --gold: #F0B83C;
            --line: #DCD2B8;
            --radius: 20px;
            --shadow: 0 6px 18px rgba(43, 58, 85, 0.12);
            --font-display: 'Baloo 2', system-ui, sans-serif;
            --font-body: 'Atkinson Hyperlegible', system-ui, sans-serif;
            --base-size: 16px;
        }

        * {
            box-sizing: border-box;
        }

        html,
        body {
            margin: 0;
            padding: 0;
        }

        body {
            font-family: var(--font-body);
            background: var(--paper);
            color: var(--ink);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            font-size: var(--base-size);
            -webkit-tap-highlight-color: transparent;
        }

        body.dyslexia {
            letter-spacing: 0.02em;
            word-spacing: 0.08em;
            line-height: 1.8;
        }

        body.dyslexia * {
            font-weight: 500 !important;
        }

        /* background texture - soft paper dots, calm not busy */
        body {
            background-image: radial-gradient(circle at 1px 1px, rgba(43, 58, 85, 0.06) 1px, transparent 0);
            background-size: 22px 22px;
        }

        .app {
            width: 100%;
            max-width: 480px;
            min-height: 100vh;
            background: var(--paper);
            display: flex;
            flex-direction: column;
            position: relative;
            box-shadow: var(--shadow);
        }

        /* ---------- TOP BAR ---------- */
        .topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 16px 10px;
            gap: 10px;
        }

        .stage-dots {
            display: flex;
            gap: 6px;
            align-items: center;
        }

        .stage-dot {
            width: 28px;
            height: 8px;
            border-radius: 6px;
            background: var(--line);
            transition: background .3s, transform .3s;
        }

        .stage-dot.active {
            background: var(--coral);
        }

        .stage-dot.done {
            background: var(--mint-dark);
        }

        .access-btn {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            border: 2px solid var(--navy);
            background: var(--paper);
            color: var(--navy);
            font-size: 17px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        .access-btn:focus-visible,
        button:focus-visible,
        input:focus-visible {
            outline: 3px solid var(--gold);
            outline-offset: 2px;
        }

        /* ---------- ACCESSIBILITY PANEL ---------- */
        .access-panel {
            position: absolute;
            top: 60px;
            right: 14px;
            z-index: 30;
            background: white;
            border: 2px solid var(--navy);
            border-radius: 16px;
            padding: 14px;
            box-shadow: var(--shadow);
            width: 230px;
            display: none;
        }

        .access-panel.open {
            display: block;
        }

        .access-panel h4 {
            margin: 0 0 8px;
            font-family: var(--font-display);
            font-size: 15px;
            color: var(--navy);
        }

        .access-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 6px 0;
            font-size: 14px;
        }

        .access-row span {
            flex: 1;
        }

        .stepper {
            display: flex;
            gap: 6px;
            align-items: center;
        }

        .stepper button {
            width: 28px;
            height: 28px;
            border-radius: 8px;
            border: 1px solid var(--navy);
            background: var(--paper-soft);
            font-weight: 700;
            cursor: pointer;
            font-size: 14px;
        }

        .toggle {
            width: 42px;
            height: 24px;
            border-radius: 14px;
            background: var(--line);
            position: relative;
            cursor: pointer;
            border: none;
            padding: 0;
        }

        .toggle.on {
            background: var(--mint-dark);
        }

        .toggle .knob {
            position: absolute;
            top: 3px;
            left: 3px;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: white;
            transition: left .2s;
        }

        .toggle.on .knob {
            left: 21px;
        }

        /* ---------- MAIN CONTENT ---------- */
        .stage-label {
            text-align: center;
            font-family: var(--font-display);
            font-size: 13px;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            color: var(--coral-dark);
            font-weight: 700;
            margin: 0 0 4px;
        }

        .content {
            flex: 1;
            padding: 6px 20px 16px;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }

        .slide {
            animation: fadein .35s ease;
        }

        @keyframes fadein {
            from {
                opacity: 0;
                transform: translateY(8px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (prefers-reduced-motion: reduce) {
            .slide {
                animation: none;
            }
        }

        h1.slide-title {
            font-family: var(--font-display);
            font-size: 28px;
            color: var(--navy);
            margin: 6px 0 10px;
            line-height: 1.15;
            font-weight: 700;
        }

        h2.slide-sub {
            font-family: var(--font-display);
            font-size: 19px;
            color: var(--coral-dark);
            margin: 0 0 14px;
            font-weight: 600;
        }

        p,
        li {
            font-size: 1em;
            line-height: 1.6;
        }

        .lead {
            font-size: 1.05em;
            color: #3A3F4D;
            margin-bottom: 14px;
        }

        .card {
            background: white;
            border: 2px solid var(--line);
            border-radius: var(--radius);
            padding: 16px 18px;
            margin-bottom: 14px;
            box-shadow: var(--shadow);
        }

        .card.navy {
            background: var(--navy);
            color: white;
            border-color: var(--navy);
        }

        .card.navy .term {
            color: var(--gold);
        }

        .card.coral-edge {
            border-color: var(--coral);
        }

        .term-row {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
            align-items: flex-start;
        }

        .term-row .label {
            font-family: var(--font-display);
            font-weight: 700;
            color: var(--coral-dark);
            min-width: 96px;
        }

        .expr {
            font-family: var(--font-display);
            font-weight: 600;
            font-size: 1.3em;
            color: var(--navy);
        }

        /* Bracket "unpack" visual — the signature device */
        .unpack-box {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            flex-wrap: wrap;
            background: var(--paper-soft);
            border-radius: 16px;
            padding: 18px 14px;
            margin: 10px 0 16px;
        }

        .flap {
            display: inline-block;
            font-size: 1.5em;
            font-family: var(--font-display);
            font-weight: 700;
            color: var(--navy);
            transition: transform .5s ease, color .5s;
        }

        .flap.opened {
            color: var(--coral);
            transform: scale(1.08);
        }

        .step-reveal-btn {
            display: block;
            margin: 8px auto 0;
            background: var(--coral);
            color: white;
            border: none;
            font-family: var(--font-display);
            font-weight: 600;
            font-size: 15px;
            padding: 10px 18px;
            border-radius: 30px;
            cursor: pointer;
        }

        .step-line {
            opacity: 0;
            max-height: 0;
            overflow: hidden;
            transition: opacity .4s ease;
            text-align: center;
            font-family: var(--font-display);
            font-size: 1.15em;
            color: var(--navy);
            margin-top: 6px;
        }

        .step-line.show {
            opacity: 1;
            max-height: 80px;
        }

        ul.key-list {
            padding-left: 0;
            list-style: none;
            margin: 0;
        }

        ul.key-list li {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
            align-items: flex-start;
        }

        ul.key-list li .dot {
            flex: 0 0 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--mint-dark);
            margin-top: 8px;
        }

        /* Buttons / answer options */
        .option-btn {
            display: block;
            width: 100%;
            text-align: left;
            background: white;
            border: 2px solid var(--line);
            border-radius: 14px;
            padding: 13px 16px;
            margin-bottom: 10px;
            font-family: var(--font-body);
            font-size: 1em;
            color: var(--ink);
            cursor: pointer;
            transition: border-color .2s, background .2s;
        }

        .option-btn:hover {
            border-color: var(--coral);
        }

        .option-btn.correct {
            background: #EAF6EF;
            border-color: var(--mint-dark);
        }

        .option-btn.incorrect {
            background: #FBEAE5;
            border-color: var(--coral-dark);
        }

        .option-btn:disabled {
            cursor: default;
        }

        .feedback {
            margin-top: 8px;
            padding: 12px 14px;
            border-radius: 14px;
            font-size: 0.97em;
            display: none;
        }

        .feedback.show {
            display: block;
            animation: fadein .3s ease;
        }

        .feedback.correct {
            background: #EAF6EF;
            color: #3D6E54;
            border: 1.5px solid var(--mint-dark);
        }

        .feedback.incorrect {
            background: #FBEAE5;
            color: #8C3A20;
            border: 1.5px solid var(--coral-dark);
        }

        .answer-input {
            width: 100%;
            padding: 13px 14px;
            font-size: 1.05em;
            border: 2px solid var(--line);
            border-radius: 14px;
            font-family: var(--font-body);
            margin-bottom: 10px;
            background: white;
            color: var(--ink);
        }

        .answer-input:focus {
            border-color: var(--coral);
            outline: none;
        }

        .check-btn {
            background: var(--navy);
            color: white;
            border: none;
            font-family: var(--font-display);
            font-weight: 600;
            font-size: 15px;
            padding: 11px 22px;
            border-radius: 30px;
            cursor: pointer;
            margin-top: 2px;
        }

        .check-btn:active {
            transform: scale(0.97);
        }

        .hint-toggle {
            font-size: 0.9em;
            color: var(--coral-dark);
            background: none;
            border: none;
            cursor: pointer;
            text-decoration: underline;
            padding: 0;
            margin-top: 4px;
        }

        .hint-box {
            display: none;
            background: var(--paper-soft);
            border-radius: 12px;
            padding: 10px 12px;
            margin-top: 8px;
            font-size: 0.93em;
        }

        .hint-box.show {
            display: block;
        }

        .match-grid {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .match-pair {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .match-card {
            flex: 1;
            background: white;
            border: 2px solid var(--line);
            border-radius: 12px;
            padding: 10px 12px;
            text-align: center;
            font-family: var(--font-display);
            font-weight: 600;
            cursor: pointer;
            font-size: 0.95em;
            color: var(--navy);
        }

        .match-card.selected {
            border-color: var(--coral);
            background: #FFF3EE;
        }

        .match-card.matched-correct {
            border-color: var(--mint-dark);
            background: #EAF6EF;
            cursor: default;
        }

        .match-card.matched-wrong {
            border-color: var(--coral-dark);
            background: #FBEAE5;
        }

        .objectives-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .objectives-list li {
            display: flex;
            gap: 10px;
            align-items: flex-start;
            margin-bottom: 12px;
            font-size: 1.02em;
        }

        .check-icon {
            flex: 0 0 26px;
            height: 26px;
            border-radius: 50%;
            background: var(--mint);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: 700;
        }

        /* WELCOME / COMPLETION full screens */
        .full-screen {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 30px 24px;
        }

        .full-screen.navy-bg {
            background: var(--navy);
            color: white;
            border-radius: 0 0 28px 28px;
            margin: -6px -20px 0;
            padding: 50px 28px 40px;
        }

        .full-screen .icon-big {
            font-size: 64px;
            margin-bottom: 14px;
        }

        .full-screen h1 {
            font-family: var(--font-display);
            font-size: 32px;
            margin: 0 0 10px;
        }

        .full-screen p {
            font-size: 1.05em;
            opacity: 0.92;
            max-width: 340px;
        }

        .start-btn {
            margin-top: 26px;
            background: var(--coral);
            color: white;
            border: none;
            font-family: var(--font-display);
            font-weight: 700;
            font-size: 17px;
            padding: 14px 34px;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 6px 16px rgba(232, 113, 74, 0.4);
        }

        .start-btn:active {
            transform: scale(0.97);
        }

        .stars {
            display: flex;
            gap: 6px;
            margin: 14px 0;
        }

        .stars span {
            font-size: 30px;
            animation: pop .5s ease backwards;
        }

        .stars span:nth-child(1) {
            animation-delay: .1s;
        }

        .stars span:nth-child(2) {
            animation-delay: .25s;
        }

        .stars span:nth-child(3) {
            animation-delay: .4s;
        }

        @keyframes pop {
            from {
                transform: scale(0);
                opacity: 0;
            }

            to {
                transform: scale(1);
                opacity: 1;
            }
        }

        .badge-row {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
            margin-top: 10px;
        }

        .badge {
            background: rgba(255, 255, 255, 0.12);
            border: 1.5px solid rgba(255, 255, 255, 0.5);
            border-radius: 30px;
            padding: 8px 14px;
            font-size: 0.85em;
            font-family: var(--font-display);
        }

        /* ---------- NAV BAR ---------- */
        .navbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 18px 18px;
            gap: 12px;
        }

        .nav-btn {
            flex: 1;
            max-width: 140px;
            font-family: var(--font-display);
            font-weight: 600;
            font-size: 15px;
            border-radius: 30px;
            padding: 13px 0;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .nav-btn.back {
            background: var(--paper-soft);
            color: var(--navy);
            border: 2px solid var(--line);
        }

        .nav-btn.next {
            background: var(--coral);
            color: white;
        }

        .nav-btn:disabled {
            opacity: 0.35;
            cursor: default;
        }

        .nav-progress {
            font-size: 0.8em;
            color: #8A8470;
            font-family: var(--font-display);
        }

        .simplify-toggle-wrap {
            text-align: center;
            margin-bottom: 10px;
        }

        .simplify-toggle-wrap button {
            background: var(--paper-soft);
            border: 1.5px solid var(--line);
            border-radius: 20px;
            padding: 6px 14px;
            font-size: 0.85em;
            cursor: pointer;
            font-family: var(--font-body);
        }

        .quiz-result-box {
            text-align: center;
        }

        .score-circle {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            border: 6px solid var(--mint-dark);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 14px auto;
            font-family: var(--font-display);
            font-size: 26px;
            color: var(--navy);
            font-weight: 700;
        }

        @media (min-width:520px) {
            body {
                align-items: center;
            }

            .app {
                border-radius: 28px;
                margin: 24px 0;
                min-height: calc(100vh - 48px);
            }
        }
    </style>
</head>

<body>
    <div class="app" id="app">

        <div class="topbar" id="topbar" style="display:none;">
            <div class="stage-dots" id="stageDots"></div>
            <button class="access-btn" id="accessBtn" aria-label="Accessibility settings">Aa</button>
        </div>

        <div class="access-panel" id="accessPanel">
            <h4>Reading settings</h4>
            <div class="access-row">
                <span>Text size</span>
                <div class="stepper">
                    <button id="sizeDown" aria-label="Decrease text size">−</button>
                    <button id="sizeUp" aria-label="Increase text size">+</button>
                </div>
            </div>
            <div class="access-row">
                <span>Easy-read spacing</span>
                <button class="toggle" id="dyslexiaToggle" aria-label="Toggle easy-read spacing"><span
                        class="knob"></span></button>
            </div>
            <div class="access-row">
                <span>Simple wording</span>
                <button class="toggle" id="simpleToggle" aria-label="Toggle simple wording"><span
                        class="knob"></span></button>
            </div>
        </div>

        <div class="content" id="content"></div>

        <div class="navbar" id="navbar" style="display:none;">
            <button class="nav-btn back" id="backBtn">← Back</button>
            <span class="nav-progress" id="navProgress"></span>
            <button class="nav-btn next" id="nextBtn">Next →</button>
        </div>

    </div>

    <script>
        /* ================= STATE ================= */
        const state = {
            slideIndex: 0,
            fontSize: 16,
            dyslexia: false,
            simple: false,
        };

        /* simplified-wording text for word problems: key -> {normal, simple} */
        const wording = {
            cost: {
                normal: "Apples cost (2a + 1) pence each. Sam buys 3 apples and Tom buys 2 apples. Write and simplify an expression for the total amount they spend.",
                simple: "One apple costs (2a + 1) pence. Sam buys 3 apples. Tom buys 2 apples. Write one simple expression for how much they spend altogether."
            },
            perimeter: {
                normal: "A rectangle has a length of (x + 3) and a width of (x + 1). Write a simplified expression for its perimeter.",
                simple: "A rectangle's long side is (x + 3). Its short side is (x + 1). Perimeter means the distance all the way around. Write one simple expression for the perimeter."
            },
            area: {
                normal: "A garden is split into two sections. One section covers 4(y + 2) m² and the other covers 3(y − 1) m². Write a simplified expression for the total area of the garden.",
                simple: "A garden has two parts. Part A is 4(y + 2) m². Part B is 3(y − 1) m². Write one simple expression for the whole garden's area."
            }
        };

        /* ================= STAGE MAP (for dots) ================= */
        /* index ranges per stage, used to color progress dots */
        const stageRanges = [
            { name: "Start", from: 0, to: 1 },
            { name: "Stage 1", from: 2, to: 5 },
            { name: "Stage 2", from: 6, to: 9 },
            { name: "Stage 3", from: 10, to: 13 },
            { name: "Stage 4", from: 14, to: 18 },
            { name: "Quiz", from: 19, to: 22 },
            { name: "Done", from: 23, to: 23 },
        ];

        /* ================= SLIDE DEFINITIONS ================= */
        /* each slide returns {stageLabel, html, onMount} */

        function slideWelcome() {
            return `
  <div class="full-screen navy-bg">
    <div class="icon-big">🎒</div>
    <h1>Unpack the Brackets</h1>
    <p>A hands-on algebra adventure for expanding and simplifying expressions.</p>
    <button class="start-btn" id="startBtn">Let's begin →</button>
  </div>`;
        }

        function slideObjectives() {
            return `
  <h1 class="slide-title">What you'll learn</h1>
  <p class="lead">By the end of this lesson, you'll be able to:</p>
  <ul class="objectives-list">
    <li><span class="check-icon">✓</span> Explain what an algebraic expression is</li>
    <li><span class="check-icon">✓</span> Expand brackets by multiplying every term inside</li>
    <li><span class="check-icon">✓</span> Simplify expressions by collecting like terms</li>
    <li><span class="check-icon">✓</span> Solve expressions with more than one step</li>
    <li><span class="check-icon">✓</span> Use algebra to solve real-life problems</li>
  </ul>
  <div class="card coral-edge">
    <p style="margin:0;">You'll move through four stages: <b>Beginner → Explorer → Builder → Advanced</b>, each one a little trickier than the last. Tap the <b>Aa</b> icon any time to change text size or turn on easy-read spacing.</p>
  </div>`;
        }

        function slideS1Intro() {
            return `
  <h1 class="slide-title">What is an algebraic expression?</h1>
  <p class="lead">It's a mix of numbers, letters, and operations — like a recipe written in maths.</p>
  <div class="card">
    <div class="term-row"><span class="label">Variable</span><span>a letter, like <span class="expr">x</span>, standing in for a number we don't know yet</span></div>
    <div class="term-row"><span class="label">Coefficient</span><span>the number sitting in front of a variable — the <span class="expr">3</span> in <span class="expr">3x</span></span></div>
    <div class="term-row"><span class="label">Term</span><span>one single piece of an expression, like <span class="expr">5x</span> or <span class="expr">2</span></span></div>
    <div class="term-row"><span class="label">Expression</span><span>terms joined together, like <span class="expr">3x + 2</span></span></div>
  </div>
  <p>Keep these four words handy — you'll use them throughout the lesson.</p>`;
        }

        function slideS1Brackets() {
            return `
  <h1 class="slide-title">Brackets mean "share it out"</h1>
  <p class="lead">A number sitting right outside a bracket multiplies <b>every single term</b> inside it. Nothing gets left out.</p>
  <div class="unpack-box" id="unpackBox1">

                        const exprText = key[exprId];
                        const ansText = card.textContent.trim();
                        if (exprText === ansText) {

        /* ================= SLIDE LIST ================= */
        const slides = [
            { stage: "", html: slideWelcome },
            { stage: "Learning objectives", html: slideObjectives },
            { stage: "Stage 1 · Beginner", html: slideS1Intro },
            { stage: "Stage 1 · Beginner", html: slideS1Brackets, mount: slideS1Brackets_mount },
            { stage: "Stage 1 · Beginner", html: slideS1Worked, mount: slideS1Worked_mount },
            { stage: "Stage 2 · Explorer", html: slideS2Intro },
            { stage: "Stage 2 · Explorer", html: slideS2Worked1, mount: slideS2Worked1_mount },
            { stage: "Stage 2 · Explorer", html: slideS2Worked2, mount: slideS2Worked2_mount },
            { stage: "Stage 2 · Explorer", html: slideS2Match, mount: slideS2Match_mount },
            { stage: "Stage 3 · Builder", html: slideS3Intro },
            { stage: "Stage 3 · Builder", html: slideS3Q1, mount: slideS3Q1_mount },
            { stage: "Stage 3 · Builder", html: slideS3Q2, mount: slideS3Q2_mount },
            { stage: "Stage 3 · Builder", html: slideS3Q3, mount: slideS3Q3_mount },
            { stage: "Stage 3 · Builder", html: slideS3Activity, mount: slideS3Activity_mount },
            { stage: "Stage 4 · Advanced", html: slideS4Intro },
            { stage: "Stage 4 · Advanced", html: slideS4Q1, mount: slideS4Q1_mount },
            { stage: "Stage 4 · Advanced", html: slideS4Q2, mount: slideS4Q2_mount },
            { stage: "Stage 4 · Advanced", html: slideS4Challenges, mount: slideS4Challenges_mount },
            { stage: "Knowledge check", html: slideQuizIntro },
            { stage: "Knowledge check", html: slideQuiz1, mount: slideQuiz1_mount },
            { stage: "Knowledge check", html: slideQuiz2, mount: slideQuiz2_mount },
            { stage: "Knowledge check", html: slideQuiz3, mount: slideQuiz3_mount },
            { stage: "Knowledge check", html: slideQuizResult, mount: slideQuizResult_mount },
            { stage: "", html: slideCompletion, mount: slideCompletion_mount },
        ];

        /* ================= RENDER / NAV ================= */
        function render() {
            const i = state.slideIndex;
            const slide = slides[i];
            const isFullScreen = (i === 0 || i === slides.length - 1);

            document.getElementById('topbar').style.display = isFullScreen ? 'none' : 'flex';
            document.getElementById('navbar').style.display = isFullScreen ? 'none' : 'flex';

            const content = document.getElementById('content');
            content.innerHTML = `<div class="slide">${slide.stage && !isFullScreen ? `<p class="stage-label">${slide.stage}</p>` : ''}${slide.html()}</div>`;

            if (slide.mount) slide.mount();

            // welcome / completion buttons
            const startBtn = document.getElementById('startBtn');
            if (startBtn) startBtn.addEventListener('click', () => { state.slideIndex = 1; render(); });

            renderDots();
            renderNav();
            content.scrollTop = 0;
            applyAccessibilityToDOM();
        }

        function renderDots() {
            const dotsEl = document.getElementById('stageDots');
            if (!dotsEl) return;
            const labels = ["S1", "S2", "S3", "S4", "Quiz"];
            const ranges = [
                { from: 2, to: 4 }, { from: 5, to: 8 }, { from: 9, to: 13 }, { from: 14, to: 17 }, { from: 18, to: 22 }
            ];
            dotsEl.innerHTML = '';
            ranges.forEach((r, idx) => {
                const dot = document.createElement('div');
                dot.className = 'stage-dot';
                const i = state.slideIndex;
                if (i > r.to) dot.classList.add('done');
                else if (i >= r.from && i <= r.to) dot.classList.add('active');
                dotsEl.appendChild(dot);
            });
        }

        function renderNav() {
            const backBtn = document.getElementById('backBtn');
            const nextBtn = document.getElementById('nextBtn');
            const navProgress = document.getElementById('navProgress');
            if (!backBtn) return;
            const i = state.slideIndex;
            backBtn.disabled = (i <= 1);
            navProgress.textContent = `${i} / ${slides.length - 2}`;
            nextBtn.textContent = (i === slides.length - 2) ? "Finish →" : "Next →";
            backBtn.onclick = () => { if (i > 1) { state.slideIndex--; render(); } };
            nextBtn.onclick = () => {
                if (i < slides.length - 1) { state.slideIndex++; render(); }
            };
        }

        /* ================= ACCESSIBILITY ================= */
        function applyAccessibilityToDOM() {
            document.documentElement.style.setProperty('--base-size', state.fontSize + 'px');
            document.body.style.fontSize = state.fontSize + 'px';
            document.body.classList.toggle('dyslexia', state.dyslexia);
        }
        function syncSimpleToggleUI() {
            const t = document.getElementById('simpleToggle');
            if (t) t.classList.toggle('on', state.simple);
        }

        document.getElementById('accessBtn').addEventListener('click', () => {
            document.getElementById('accessPanel').classList.toggle('open');
        });
        document.getElementById('sizeUp').addEventListener('click', () => {
            state.fontSize = Math.min(state.fontSize + 2, 24);
            applyAccessibilityToDOM();
        });
        document.getElementById('sizeDown').addEventListener('click', () => {
            state.fontSize = Math.max(state.fontSize - 2, 13);
            applyAccessibilityToDOM();
        });
        document.getElementById('dyslexiaToggle').addEventListener('click', (e) => {
            state.dyslexia = !state.dyslexia;
            e.currentTarget.classList.toggle('on', state.dyslexia);
            applyAccessibilityToDOM();
        });
        document.getElementById('simpleToggle').addEventListener('click', (e) => {
            state.simple = !state.simple;
            e.currentTarget.classList.toggle('on', state.simple);
            // if currently on a slide showing wording, refresh it
            render();
        });

        /* init */
        render();
    </script>
</body>

</html>
